services:
  - type: web
    name: fast-aid-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from app.database import Base, engine; Base.metadata.create_all(bind=engine)" && python app/seed_guides.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fast_aid.db
      - key: PYTHONPATH
        value: /opt/render/project/src
