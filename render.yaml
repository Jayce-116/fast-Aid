services:
  # ---- BACKEND: FastAPI on Render ----
  - type: web
    name: fast-aid-api
    runtime: python
    rootDir: app
    buildCommand: pip install -r ../requirements.txt; python seed_guides.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fast_aid.db
      - key: PYTHONPATH
        value: /opt/render/project/src
